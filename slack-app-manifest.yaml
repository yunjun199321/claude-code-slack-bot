display_information:
  name: Claude Code Bot
  description: AI-powered coding assistant using Claude Agent SDK
  background_color: "#4A154B"
  long_description: A configurable Slack bot powered by Claude Agent SDK. Supports streaming responses, session management, MCP tool integration, file uploads, interactive permission prompts, and customizable system prompts and shortcut commands.
features:
  app_home:
    home_tab_enabled: false
    messages_tab_enabled: true
    messages_tab_read_only_enabled: false
  bot_user:
    display_name: Claude Code
    always_online: true
oauth_config:
  scopes:
    bot:
      - app_mentions:read
      - channels:history
      - chat:write
      - chat:write.public
      - files:read
      - im:history
      - im:read
      - im:write
      - users:read
      - reactions:read
      - reactions:write
settings:
  event_subscriptions:
    bot_events:
      - app_mention
      - message.im
      - member_joined_channel
  interactivity:
    is_enabled: true
  org_deploy_enabled: false
  socket_mode_enabled: true
  token_rotation_enabled: false